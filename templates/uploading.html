<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Generating dashboard…</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  background:linear-gradient(135deg,#0f2d54 0%,#1a4a8a 60%,#0d3068 100%);
  min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem}
.card{background:#fff;border-radius:20px;box-shadow:0 24px 64px rgba(0,0,0,.35);
  width:100%;max-width:480px;padding:2.5rem 2.25rem;text-align:center}
.spinner{width:48px;height:48px;border:4px solid #e2e8f0;border-top-color:#1a4a8a;
  border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 1.5rem}
@keyframes spin{to{transform:rotate(360deg)}}
h1{font-size:1.1rem;color:#0f2d54;font-weight:700;margin-bottom:.4rem}
.stage{font-size:.85rem;color:#64748b;margin-bottom:1.5rem;min-height:1.2em}
.bar-track{background:#f1f5f9;border-radius:999px;height:10px;overflow:hidden;margin-bottom:.5rem}
.bar-fill{background:linear-gradient(90deg,#1a4a8a,#3b82f6);height:100%;width:0%;
  border-radius:999px;transition:width .4s ease}
.bar-label{font-size:.75rem;color:#94a3b8}
.err{display:none;background:#fef2f2;border:1px solid #fecaca;color:#991b1b;
  border-radius:10px;padding:1rem;font-size:.8rem;text-align:left;margin-top:1rem;
  white-space:pre-wrap;max-height:240px;overflow:auto}
.retry{display:none;margin-top:1rem;color:#1d4ed8;font-weight:600;font-size:.85rem;
  text-decoration:none}
</style>
</head>
<body>
<div class="card">
  <div class="spinner" id="spinner"></div>
  <h1 id="title">Parsing masterlist…</h1>
  <p class="stage" id="stage">This usually takes 1–3 minutes for the full file — please keep this tab open.</p>
  <div class="bar-track"><div class="bar-fill" id="bar"></div></div>
  <div class="bar-label" id="barLabel">Starting…</div>
  <pre class="err" id="err"></pre>
  <a class="retry" id="retry" href="/">← Back to upload</a>
</div>
<script>
async function poll(){
  try{
    const r = await fetch('/upload_status');
    const d = await r.json();
    if(d.status === 'done'){
      document.getElementById('title').textContent = 'Done — opening dashboard…';
      document.getElementById('barLabel').textContent = 'Complete';
      document.getElementById('bar').style.width = '100%';
      window.location.href = '/';
      return;
    }
    if(d.status === 'error'){
      document.getElementById('spinner').style.display = 'none';
      document.getElementById('title').textContent = 'Something went wrong';
      document.getElementById('stage').textContent = '';
      document.getElementById('err').style.display = 'block';
      document.getElementById('err').textContent = d.error || 'Unknown error';
      document.getElementById('retry').style.display = 'inline-block';
      return;
    }
    if(d.stage) document.getElementById('stage').textContent = d.stage;
    if(d.total){
      const pct = Math.min(100, Math.round(d.progress / d.total * 100));
      document.getElementById('bar').style.width = pct + '%';
      document.getElementById('barLabel').textContent = pct + '% · ' + d.progress.toLocaleString() + ' / ' + d.total.toLocaleString() + ' rows';
    } else {
      document.getElementById('barLabel').textContent = 'Reading file…';
    }
  }catch(e){
    // transient network hiccup — keep polling
  }
  setTimeout(poll, 1200);
}
poll();
</script>
</body>
</html>
