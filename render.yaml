services:
  - type: web
    name: pob-collection-dashboard
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --workers 1 --worker-class gthread --threads 4 --timeout 300 --bind 0.0.0.0:$PORT
    envVars:
      - key: FLASK_DEBUG
        value: "0"
    autoDeploy: true
